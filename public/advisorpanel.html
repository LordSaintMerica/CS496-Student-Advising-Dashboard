<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advisor Panel</title>

    <style>
        /* css for lighthouse compliance */

        button,
        input[type="submit"],
        input[type="button"] {
            min-height: 44px;
            min-width: 44px;
            padding: 10px 14px;
            margin: 8px 0;
            cursor: pointer;
        }

        input[type="text"],
        input[type="password"],
        input[type="url"] {
            min-height: 44px;
            padding: 8px 10px;
            margin: 6px 0 12px 0;
            box-sizing: border-box;
        }

        label {
            display: inline-block;
            margin-top: 10px;
        }

        a {
            display: inline-block;
            padding: 8px 0;
            margin: 6px 0;
        }

        fieldset {
            margin-bottom: 16px;
        }

        form {
            margin-bottom: 18px;
        }
    </style>
</head>
<body>

<main>

    <h2>STUDENT PATHFINDING ADVISOR PANEL</h2>
    <p id="user"></p>

    <form action="/logout" method="GET">
        <button type="submit">Logout</button>
    </form>

    <button type="button" onclick="window.location.href='/transcript'">
        Go Back
    </button>

    <p>Welcome to the Advisor Panel.</p>

    <form action="/deleteuser" method="POST">
        <fieldset>
            <legend>Delete User</legend>

            <label for="delete-username">Username:</label>
            <input type="text" name="username" id="delete-username" required><br>

            <button type="submit" name="action" value="deleteuser">Delete User</button>
        </fieldset>
    </form>

    <form action="/addadvisor" method="POST">
        <fieldset>
            <legend>Add Advisor</legend>

            <label for="advisor-username">Username:</label>
            <input type="text" name="username" id="advisor-username" required><br>

            <label for="password">Password:</label>
            <input type="password" name="password" id="password" required><br>

            <button type="submit" name="action" value="addadvisor">Add Advisor</button>
        </fieldset>
    </form>

    <form action="/scrape" method="POST">
        <fieldset>
            <legend>Scrape Requirements</legend>

            <label for="url">Enter Website URL:</label>
            <input type="url" name="url" id="url"
                   placeholder="https://catalog.wku.edu/undergraduate/science-engineering/engineering-applied-sciences/computer-science-bs/"
                   required><br>
            
            <p>Please only use links leading to WKU's bachelor degree catalog. Note: this may take a moment.</p>

            <a href="https://catalog.wku.edu/undergraduate/science-engineering/engineering-applied-sciences/computer-science-bs/"
               target="_blank" rel="noopener noreferrer">
                Example Catalog Page
            </a>

            <button type="submit">Run Requirements Scraper</button>
        </fieldset>
    </form>

    <button onclick="window.location.href='/download-logs'">
        Download Report Log
    </button>

    <script>
        //this grabs the user's username so it can display it up at the top
        fetch('/api/currentuser')
            .then(res => res.json())
            .then(data => {
                const display = document.getElementById('user');
                display.textContent = data.user || 'No user, somehow';
            })
            .catch(err => console.error(err));
    </script>

</main>

</body>
</html>
