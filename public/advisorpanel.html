<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advisor Panel</title>
</head>
<body>

    <h2>ADVISOR PANEL PAGE</h2>
    <p id="user"></p>

    <form action="/logout" method="GET">
        <button type="submit">Logout</button>
    </form>

    <p>yippee!! you're in the advisor panel.</p>

    <form action="/deleteuser" method="POST">
        <label for="username">Username:</label>
        <input type="text" name="username" id="username" required><br>

        <button type="submit" name="action" value="deleteuser">Delete User</button>
        
    </form>

    <form action="/addadvisor" method="POST">
        <label for="username">Username:</label>
        <input type="text" name="username" id="username" required><br>

        <label for="password">Password:</label>
        <input type="password" name="password" id="password" required><br>

        <button type="submit" name="action" value="addadvisor">Add Advisor</button>
        
    </form>

    <form action="/scrape" method="POST">
        <label for="url">Enter Website URL:</label>
        <input type="url" name="url" id="url" placeholder="https://catalog.wku.edu/undergraduate/science-engineering/engineering-applied-sciences/computer-science-bs/" required><br>
        
        <p>Please only use links leading to WKU's bachelor degree catalog. Note: this may take a moment.</p>

        <a href="https://catalog.wku.edu/undergraduate/science-engineering/engineering-applied-sciences/computer-science-bs/" target="_blank" rel="noopener noreferrer">
            Example Catalog Page
        </a>

        <button type="submit">Run Requirements Scraper</button>
    </form>

    <script>
        //this grabs the user's username so it can display it up at the top
        fetch('/api/currentuser')
            .then(res => res.json())
            .then(data => {
                const display = document.getElementById('user');
                display.textContent = data.user || 'No user, somehow';
            })
            .catch(err => console.error(err));
    </script>

</body>
</html>
