<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Four Year Plan</title>

    <style>
        /* css for lighthouse compliance */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        table {
            border-collapse: collapse;
            width: 60%;
            margin-bottom: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background: #f2f2f2;
            text-align: left;
        }

        .controls {
            padding: 10px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            width: 60%;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <form action="/logout" method="GET">
        <button type="submit">Logout</button>
    </form>

    <button type="button" onclick="window.location.href='/transcript'">
        Go Back
    </button>

    <main>

        <h2>Four Year Plan</h2>

        <p>Program: <span id="programname">Loading...</span></p>

        <!-- CONTROLS -->
        <div class="controls">

            <h3>Planner Options</h3>

            <label>
                <input type="checkbox" id="sixCourse">
                6-course semesters
            </label>
            <br><br>

            <label>
                <input type="checkbox" id="winter">
                Include winter semesters
            </label>
            <br><br>

            <label>
                <input type="checkbox" id="summer">
                Include summer semesters
            </label>
            <br><br>

            <button onclick="regeneratePlan()">Regenerate Plan</button>

        </div>


        <div id="plan-container"></div>

        <p id="credits"></p>

        <script>

        let currentPlan = null;

        //loads the plan initially when the page is open
        function loadPlan() {
            fetch("/api/fouryearplan")
                .then(res => res.json())
                .then(data => {
                    currentPlan = data;
                    renderPlan(data);
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("plan-container").innerHTML =
                        "Failed to load plan.";
                });
        }

        function renderPlan(data) {//creates the tables and fills the variable text
            const container = document.getElementById("plan-container");
            container.innerHTML = "";

            document.getElementById("programname").textContent =
                data.major || "Unknown";

            const creditsElement = document.getElementById("credits");

            if (data.graduationElegible === false) {//this part makes the red warning show up if the plan won't let you graduate
            //only should show up on transcript plans, should never show up on default plans
                let warning = document.getElementById("grad-warning");

                if (!warning) {
                    warning = document.createElement("p");
                    warning.id = "grad-warning";
                    warning.style.color = "red";
                    warning.style.fontWeight = "bold";
                    warning.textContent = "Graduation in four years is not feasible based on this plan.";
                    creditsElement.parentNode.insertBefore(warning, creditsEl);
                }
            } else {
                const warning = document.getElementById("grad-warning");
                if (warning) warning.remove();
            }


            const semesters = data.semesters;//pulls the planned semesters from the json

            for (const [semNum, semData] of Object.entries(semesters)) {

                const header = document.createElement("h3");
                header.textContent = `Semester ${semNum} — ${semData.season}`;
                container.appendChild(header);

                const table = document.createElement("table");

                const tbody = document.createElement("tbody");

                semData.courses.forEach(course => {
                    const row = document.createElement("tr");
                    const cell = document.createElement("td");
                    cell.textContent = course;
                    row.appendChild(cell);
                    tbody.appendChild(row);
                });

                table.appendChild(tbody);
                container.appendChild(table);
            }

            document.getElementById("credits").textContent =
                `Total Credits: ${data.totalCredits}`;
        }

        //regenerates the plan without needing a page refresh
        //calls the load again after receiving the json 
        function regeneratePlan() {

            const sixCourse = document.getElementById("sixCourse").checked;
            const winter = document.getElementById("winter").checked;
            const summer = document.getElementById("summer").checked;

            fetch("/api/generate-plan", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    sixCourse,
                    winter,
                    summer
                })
            })
            .then(res => res.json())
            .then(() => {
                loadPlan(); //refresh 
            })
            .catch(err => {
                console.error("Failed to regenerate plan:", err);
            });
        }

        //initial load
        loadPlan();
        </script>
    </main>


</body>
</html>
